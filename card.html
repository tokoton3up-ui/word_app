<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>単語カード</title>
  <style>
    body {
      margin: 0;
      background: #ffffff;
      font-family: "Yu Gothic UI", sans-serif;
      overflow: hidden;
    }

    .screen {
      width: 100vw; height: 100vh;
      display: flex; flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 20mm;
      position: relative;
    }

    .card {
      width: 80%;
      min-height: 40mm;
      background: #F5F5F0;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26pt;
      color: #222;
      text-align: center;
      padding: 10mm;
      margin-bottom: 10mm;
    }

    .progress {
      font-size: 14pt;
      color: #444;
      margin-bottom: 6mm;
    }

    .arrow-area {
      display: flex;
      width: 80%;
      justify-content: space-between;
      margin-top: 0mm;
    }
    .arrow {
      font-size: 26pt;
      color: #666;
      user-select: none;
      cursor: pointer;
    }

    .speaker {
      position: absolute;
      top: 10mm; right: 10mm;
      font-size: 22pt;
      color: #666;
      user-select: none;
      cursor: pointer;
    }

    .reset-btn {
      position: absolute;
      top: 10mm;
      right: 40mm;
      font-size: 20pt;
      color: #666;
      cursor: pointer;
    }

    .settings-btn {
      position: absolute;
      top: 10mm; right: 25mm;
      font-size: 20pt;
      color: #666;
      cursor: pointer;
    }

    .settings-panel {
      position: absolute;
      top: 20mm; right: 10mm;
      background: #fff;
      border: 1px solid #ccc;
      padding: 5mm;
      border-radius: 6px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
    .hidden { display: none; }

    .learned-btn {
      font-size: 14pt;
      padding: 6mm 12mm;
      margin-bottom: 6mm;
      border: none;
      border-radius: 6px;
      background: #d0e8d0;
      color: #333;
      cursor: pointer;
    }

    .character {
      position: absolute;
      bottom: 5mm; left: 5mm;
      width: 40mm;
      opacity: 0.9;
    }

    .back-button {
      position: absolute;
      top: 6mm;
      left: 6mm;
      font-size: 20pt;
      color: #666;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="screen">
    <!-- 戻るボタンの処理を関数化 -->
    <div class="back-button" onclick="goBack()">×</div>

    <div class="settings-btn" onclick="toggleSettings()">⚙</div>
    <div class="speaker" onclick="playSound()">🔊</div>
    <div class="reset-btn" onclick="resetExcluded()">↺</div>

    <div id="settings-panel" class="settings-panel hidden">
      <label>発音速度</label><br>
      <input type="range" id="speed-range" min="0.5" max="1.5" step="0.1">
    </div>

    <div id="card" class="card" onclick="flipCard()"></div>

    <div id="progress" class="progress"></div>

    <button id="btn-learned" class="learned-btn">覚えた</button>

    <div class="arrow-area">
      <div class="arrow" onclick="prevCard()">←</div>
      <div class="arrow" onclick="nextCard()">→</div>
    </div>

    <img src="character.png" class="character">
  </div>

<script>
  /* --- URL パラメータの取得 --- */
  const params = new URLSearchParams(location.search);
  const targetUrl = params.get("url");
  const startIndex = params.get("startIndex") || "";

  /* --- 教材IDの生成（index.html のリセット処理と連動させるため） --- */
  function materialIdFromUrl(url){
    try{ return btoa(unescape(encodeURIComponent(url))).replace(/=+$/,""); }
    catch(e){ return encodeURIComponent(url).replace(/[^a-zA-Z0-9]/g,'_'); }
  }
  const materialId = targetUrl ? materialIdFromUrl(targetUrl) : "default";
  const EXCLUDED_KEY = `excluded_${materialId}_card`; // 教材ごとの「覚えた」キー

  /* CSV 読み込み */
  async function loadCSV(file) {
    const res = await fetch(file);
    if (!res.ok) throw new Error("Network response was not ok");
    const text = await res.text();
    return text.trim().split("\n").map(line => {
      const [q, a] = line.split(",");
      return { q, a };
    }).filter(item => item.q && item.a); // 空行を除外
  }

  let englishVoice = null;
  speechSynthesis.onvoiceschanged = () => {
    const voices = speechSynthesis.getVoices();
    englishVoice =
      voices.find(v => v.lang.startsWith("en") && v.name.toLowerCase().includes("female")) ||
      voices.find(v => v.lang.startsWith("en")) ||
      null;
  }; 

  let words = [];
  let index = 0;
  let showingFront = true;

  // 教材ごとの除外リストを読み込み
  let excluded = JSON.parse(localStorage.getItem(EXCLUDED_KEY) || "[]");
  let speechSpeed = Number(localStorage.getItem("speechSpeed") || 1.0);

  const cardEl = document.getElementById("card");
  const progressEl = document.getElementById("progress");

  document.getElementById("speed-range").value = speechSpeed;
  document.getElementById("speed-range").oninput = (e) => {
    speechSpeed = Number(e.target.value);
    localStorage.setItem("speechSpeed", speechSpeed);
  };

  function toggleSettings() {
    document.getElementById("settings-panel").classList.toggle("hidden");
  }

  function updateCard() {
    if (words.length === 0) {
      cardEl.textContent = "すべて覚えました！";
      progressEl.textContent = "";
      return;
    }
    const item = words[index];
    cardEl.textContent = showingFront ? item.q : item.a;
    progressEl.textContent = `${index + 1} / ${words.length}`;
  }

  function flipCard() {
    showingFront = !showingFront;
    updateCard();
  }

  function nextCard() {
    if (index < words.length - 1) {
      index++;
      showingFront = true;
      updateCard();
    }
  }

  function prevCard() {
    if (index > 0) {
      index--;
      showingFront = true;
      updateCard();
    }
  }

  document.getElementById("btn-learned").onclick = () => {
    const item = words[index];
    excluded.push(item.q);
    localStorage.setItem(EXCLUDED_KEY, JSON.stringify(excluded));

    words.splice(index, 1);

    if (index >= words.length) index = words.length - 1;
    showingFront = true;
    updateCard();
  };

  function playSound() {
    if (!words.length) return;
    const item = words[index];
    const utter = new SpeechSynthesisUtterance(item.a);
    utter.lang = "en-US";
    utter.rate = speechSpeed;
    if (englishVoice) {
      utter.voice = englishVoice;
    }
    speechSynthesis.speak(utter);
  }

  function resetExcluded() {
    if(confirm("この教材の「覚えた」状態をリセットしますか？")){
      localStorage.removeItem(EXCLUDED_KEY);
      alert("リセットしました");
      location.reload();
    }
  }

  // 戻るボタン（URLパラメータを保持してモード選択へ戻る）
  function goBack() {
    if (targetUrl) {
      let backUrl = `mode-select.html?url=${encodeURIComponent(targetUrl)}`;
      if (startIndex) backUrl += `&startIndex=${startIndex}`;
      location.href = backUrl;
    } else {
      location.href = 'mode-select.html';
    }
  }

  // 初期化：URLパラメータで指定されたCSVを読み込む
  document.addEventListener("DOMContentLoaded", async () => {
    if (!targetUrl) {
      cardEl.textContent = "教材が選択されていません";
      return;
    }
    try {
      let data = await loadCSV(targetUrl);
      words = data.filter(item => !excluded.includes(item.q));
      updateCard();
    } catch (e) {
      console.error(e);
      cardEl.textContent = "教材の読み込みに失敗しました";
      cardEl.style.fontSize = "16pt";
    }
  });

</script>

</body>
</html>
